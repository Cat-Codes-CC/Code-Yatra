<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="mobile">
    <!-- M is our abbreviation used for music -->
        <div class="name-m">
            <p>Upbeats Waves of Sea</p>
        </div>
        <div class="back">
            <img src="back-icon.png" alt="Go back">
        </div>
        <div class="heart">
            <img src="heart_emoji-without-bg.png" alt="Add To Favourites Button">
        </div>
        <div class="m-image">
            <img src="music-img.png" alt="Upbeats Waves of Sea Album Image">
        </div>
        <div class="large-m-name">
            <p>Upbeats Waves Of Sea</p>
        </div>
        <div class="m-singer-name">
            <p>JoyInSound</p>
        </div>
        <div class="progess-bar">
            <input type="range" min="0" max="180" value="20"> </div>
        <div class="controls">
            <div class="shuffle">
                <img src="shuffle.png" alt="Shuffle Button">
            </div>
            <div class="rewind">
                <img src="rewind-button.png" alt="Rewind Button">
            </div>
            <div class="play">
                <img src="play-button.png" alt="Play Button">
            </div>
            <div class="fast">
                <img src="fast-button.png" alt="Fast Forward Button">
            </div>
            <div class="loop">
                <img src="loop-icon.png" alt="Loop Button">
            </div>
        </div>
    </div>
</body>
</html>
