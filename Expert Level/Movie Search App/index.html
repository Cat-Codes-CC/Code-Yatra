<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Movie Search App</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>
      <svg
        xmlns="http://www.w3.org/2000/svg"
        height="24px"
        viewBox="0 -960 960 960"
        width="24px"
        fill="#e3e3e3"
      >
        <path
          d="m160-800 80 160h120l-80-160h80l80 160h120l-80-160h80l80 160h120l-80-160h120q33 0 56.5 23.5T880-720v480q0 33-23.5 56.5T800-160H160q-33 0-56.5-23.5T80-240v-480q0-33 23.5-56.5T160-800Zm0 240v320h640v-320H160Zm0 0v320-320Z"
        />
      </svg>
      Movie Search App
    </h1>
    <p id="info">Search to add Movies or TV Shows to your WatchList</p>
    <input
      type="text"
      placeholder="Search for a movie for a TV show..."
      id="search-input"
    />
    <button onclick="getMovieInfo()">
      Get Movie Info
    </button>
    <div class="coloured-line"></div>
    <div class="container">
      <p id="up-next">Up Next</p>
      <div class="add-movie">
        <p>Add Movies or TV Shows to your WatchList</p>
      </div>
      <hr />
      <div class="disclaimer">
        <p>
          Your WatchList is stored locally in your browser using HTML5
          LocalStorage. Movie information and posters provided by
          <a href="http://www.omdbapi.com/" target="_blank">OMDB</a>.
        </p>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
